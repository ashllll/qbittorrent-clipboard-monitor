<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} - qBittorrent Monitor</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/vant@2/lib/index.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">

    {% block extra_css %}{% endblock %}
    
    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --warning-color: #f39c12;
            --danger-color: #e74c3c;
            --dark-color: #2c3e50;
            --light-color: #ecf0f1;
            --sidebar-width: 240px;
            --header-height: 60px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }
        
        /* Layout */
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
            transition: transform 0.3s ease;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .sidebar-logo i {
            font-size: 28px;
            color: var(--primary-color);
        }
        
        .sidebar-logo span {
            font-size: 18px;
            font-weight: 600;
        }
        
        .sidebar-nav {
            padding: 15px 0;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: all 0.2s;
            gap: 12px;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
            border-left-color: var(--primary-color);
        }
        
        .nav-item i {
            font-size: 18px;
            width: 24px;
        }
        
        /* Main Content */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex: 1;
            min-height: 100vh;
        }
        
        /* Header */
        .main-header {
            height: var(--header-height);
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .header-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--dark-color);
        }
        
        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: rgba(46, 204, 113, 0.1);
            border-radius: 20px;
            font-size: 13px;
            color: var(--success-color);
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success-color);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Content Area */
        .main-content {
            padding: 24px;
        }
        
        /* Cards */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--dark-color);
        }
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        
        .stat-icon.primary { background: rgba(52, 152, 219, 0.1); color: var(--primary-color); }
        .stat-icon.success { background: rgba(46, 204, 113, 0.1); color: var(--success-color); }
        .stat-icon.warning { background: rgba(243, 156, 18, 0.1); color: var(--warning-color); }
        .stat-icon.danger { background: rgba(231, 76, 60, 0.1); color: var(--danger-color); }
        
        .stat-info h3 {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark-color);
        }
        
        .stat-info p {
            font-size: 13px;
            color: #999;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }
            
            .sidebar.show {
                transform: translateX(0);
            }
            
            .main-wrapper {
                margin-left: 0;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover {
            background: #2980b9;
        }
        
        .btn-success {
            background: var(--success-color);
            color: white;
        }
        
        .btn-danger {
            background: var(--danger-color);
            color: white;
        }
        
        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .data-table th {
            font-weight: 600;
            color: #666;
            background: #fafafa;
        }
        
        .data-table tr:hover td {
            background: #f9f9f9;
        }
        
        /* Tags */
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .tag-primary { background: rgba(52, 152, 219, 0.1); color: var(--primary-color); }
        .tag-success { background: rgba(46, 204, 113, 0.1); color: var(--success-color); }
        .tag-warning { background: rgba(243, 156, 18, 0.1); color: var(--warning-color); }
        .tag-danger { background: rgba(231, 76, 60, 0.1); color: var(--danger-color); }
    </style>
</head>
<body>
    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="bi bi-cloud-download"></i>
                    <span>qBittorrent</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                    <i class="bi bi-house-door"></i>
                    <span>控制台</span>
                </a>
                <a href="/torrents" class="nav-item {% if request.path == '/torrents' %}active{% endif %}">
                    <i class="bi bi-collection"></i>
                    <span>种子管理</span>
                </a>
                <a href="/stats" class="nav-item {% if request.path == '/stats' %}active{% endif %}">
                    <i class="bi bi-bar-chart"></i>
                    <span>数据统计</span>
                </a>
                <a href="/workflow" class="nav-item {% if request.path == '/workflow' %}active{% endif %}">
                    <i class="bi bi-diagram-3"></i>
                    <span>工作流</span>
                </a>
                <a href="/rss" class="nav-item {% if request.path == '/rss' %}active{% endif %}">
                    <i class="bi bi-rss"></i>
                    <span>RSS订阅</span>
                </a>
                <a href="/settings" class="nav-item {% if request.path == '/settings' %}active{% endif %}">
                    <i class="bi bi-gear"></i>
                    <span>系统设置</span>
                </a>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <div class="main-wrapper">
            <!-- Header -->
            <header class="main-header">
                <div class="header-left">
                    <button class="btn-menu" onclick="toggleSidebar()">
                        <i class="bi bi-list"></i>
                    </button>
                    <h1 class="header-title">{% block page_title %}{% endblock %}</h1>
                </div>
                <div class="header-right">
                    <div class="status-indicator">
                        <span class="status-dot"></span>
                        <span>系统正常</span>
                    </div>
                    <button class="btn btn-primary">
                        <i class="bi bi-plus-lg"></i>
                        添加任务
                    </button>
                </div>
            </header>
            
            <!-- Content -->
            <main class="main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/vant@2/lib/vant.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5"></script>
    
    <script>
        function toggleSidebar() {
            document.querySelector('.sidebar').classList.toggle('show');
        }
        
        // Vue App
        const app = Vue.createApp({
            data() {
                return {
                    activeTab: 0,
                    title: '{% block page_title %}{% endblock %}'
                }
            },
            methods: {
                initWebSocket() {
                    const ws = new WebSocket(`ws://${window.location.host}/ws`);
                    ws.onmessage = (event) => {
                        const data = JSON.parse(event.data);
                        this.handleWebSocketMessage(data);
                    };
                    this.ws = ws;
                },
                handleWebSocketMessage(data) {
                    if (data.type === 'stats_update') {
                        this.$emit('stats-update', data.data);
                    }
                }
            },
            mounted() {
                this.initWebSocket();
            }
        });
        
        app.use(vant);
        app.mount('#app');
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
