<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}qBittorrent 剪贴板监控{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* 滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
        }
        .pulse-dot {
            animation: pulse-dot 2s infinite;
        }
        
        /* 日志颜色 */
        .log-debug { color: #6b7280; }
        .log-info { color: #3b82f6; }
        .log-warning { color: #f59e0b; }
        .log-error { color: #ef4444; }
        .log-critical { color: #dc2626; font-weight: bold; }
        
        .dark .log-debug { color: #9ca3af; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 min-h-screen flex flex-col transition-colors duration-200">
    <!-- 导航栏 -->
    <nav class="bg-white dark:bg-gray-800 shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="flex items-center space-x-3">
                        <div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center">
                            <i class="fas fa-magnet text-white text-xl"></i>
                        </div>
                        <span class="text-xl font-bold text-gray-800 dark:text-white">QB Monitor</span>
                    </a>
                </div>
                
                <!-- 桌面端导航 -->
                <div class="hidden md:flex items-center space-x-1">
                    <a href="/" class="nav-link px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-primary-600 dark:hover:text-primary-400 transition-colors {% if request.url.path == '/' %}bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400{% endif %}">
                        <i class="fas fa-chart-line mr-2"></i>仪表盘
                    </a>
                    <a href="/history" class="nav-link px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-primary-600 dark:hover:text-primary-400 transition-colors {% if request.url.path == '/history' %}bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400{% endif %}">
                        <i class="fas fa-history mr-2"></i>历史记录
                    </a>
                    <a href="/categories" class="nav-link px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-primary-600 dark:hover:text-primary-400 transition-colors {% if request.url.path == '/categories' %}bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400{% endif %}">
                        <i class="fas fa-folder-open mr-2"></i>分类管理
                    </a>
                    <a href="/config" class="nav-link px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-primary-600 dark:hover:text-primary-400 transition-colors {% if request.url.path == '/config' %}bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400{% endif %}">
                        <i class="fas fa-cog mr-2"></i>配置
                    </a>
                    <a href="/logs" class="nav-link px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 hover:text-primary-600 dark:hover:text-primary-400 transition-colors {% if request.url.path == '/logs' %}bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400{% endif %}">
                        <i class="fas fa-terminal mr-2"></i>日志
                    </a>
                </div>
                
                <div class="flex items-center space-x-4">
                    <!-- 运行状态指示器 -->
                    <div id="status-indicator" class="flex items-center space-x-2 px-3 py-1 rounded-full bg-gray-100 dark:bg-gray-700">
                        <span id="status-dot" class="w-2.5 h-2.5 rounded-full {% if is_running %}bg-green-500 pulse-dot{% else %}bg-red-500{% endif %}"></span>
                        <span id="status-text" class="text-sm text-gray-600 dark:text-gray-300">{% if is_running %}运行中{% else %}已停止{% endif %}</span>
                    </div>
                    
                    <!-- 主题切换 -->
                    <button id="theme-toggle" class="p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <i class="fas fa-sun dark:hidden"></i>
                        <i class="fas fa-moon hidden dark:inline"></i>
                    </button>
                    
                    <!-- 移动端菜单按钮 -->
                    <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 移动端菜单 -->
        <div id="mobile-menu" class="hidden md:hidden bg-white dark:bg-gray-800 border-t dark:border-gray-700">
            <div class="px-4 py-3 space-y-1">
                <a href="/" class="block px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="fas fa-chart-line mr-2"></i>仪表盘
                </a>
                <a href="/history" class="block px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="fas fa-history mr-2"></i>历史记录
                </a>
                <a href="/categories" class="block px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="fas fa-folder-open mr-2"></i>分类管理
                </a>
                <a href="/config" class="block px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="fas fa-cog mr-2"></i>配置
                </a>
                <a href="/logs" class="block px-4 py-2 rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="fas fa-terminal mr-2"></i>日志
                </a>
            </div>
        </div>
    </nav>
    
    <!-- 主内容区 -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
    
    <!-- 页脚 -->
    <footer class="bg-white dark:bg-gray-800 border-t dark:border-gray-700 py-6 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500 dark:text-gray-400 text-sm">
            <p>qBittorrent Clipboard Monitor v3.0.0</p>
        </div>
    </footer>
    
    <!-- 全局脚本 -->
    <script>
        // 主题切换
        const themeToggle = document.getElementById('theme-toggle');
        const html = document.documentElement;
        
        // 检查本地存储或系统偏好
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
        } else {
            html.classList.remove('dark');
        }
        
        themeToggle.addEventListener('click', () => {
            html.classList.toggle('dark');
            localStorage.theme = html.classList.contains('dark') ? 'dark' : 'light';
        });
        
        // 移动端菜单
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
        });
        
        // WebSocket 连接
        let ws = null;
        let wsReconnectInterval = null;
        
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onopen = () => {
                console.log('WebSocket 连接成功');
                if (wsReconnectInterval) {
                    clearInterval(wsReconnectInterval);
                    wsReconnectInterval = null;
                }
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
            
            ws.onclose = () => {
                console.log('WebSocket 连接关闭');
                // 尝试重连
                if (!wsReconnectInterval) {
                    wsReconnectInterval = setInterval(connectWebSocket, 5000);
                }
            };
            
            ws.onerror = (error) => {
                console.error('WebSocket 错误:', error);
            };
        }
        
        function handleWebSocketMessage(data) {
            // 更新状态
            if (data.type === 'status') {
                updateStatusIndicator(data.data.is_running);
            }
            
            // 广播事件
            window.dispatchEvent(new CustomEvent('ws-message', { detail: data }));
        }
        
        function updateStatusIndicator(isRunning) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            
            if (isRunning) {
                dot.className = 'w-2.5 h-2.5 rounded-full bg-green-500 pulse-dot';
                text.textContent = '运行中';
            } else {
                dot.className = 'w-2.5 h-2.5 rounded-full bg-red-500';
                text.textContent = '已停止';
            }
        }
        
        // 页面加载时连接 WebSocket
        connectWebSocket();
        
        // 页面卸载时关闭 WebSocket
        window.addEventListener('beforeunload', () => {
            if (ws) {
                ws.close();
            }
        });
        
        // API 工具函数
        async function apiPost(url, data) {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return response.json();
        }
        
        async function apiGet(url) {
            const response = await fetch(url);
            return response.json();
        }
        
        async function apiDelete(url) {
            const response = await fetch(url, { method: 'DELETE' });
            return response.json();
        }
        
        // Toast 通知
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-green-500' : type === 'error' ? 'bg-red-500' : 'bg-blue-500';
            const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            
            toast.className = `fixed bottom-4 right-4 ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg flex items-center space-x-2 z-50 animate-fade-in`;
            toast.innerHTML = `
                <i class="fas ${icon}"></i>
                <span>${message}</span>
            `;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(10px)';
                toast.style.transition = 'all 0.3s';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
    
    {% block extra_scripts %}{% endblock %}
</body>
</html>
