version: '3.8'

# qBittorrent Clipboard Monitor 完整监控栈
# 
# 包含服务:
# - qb-monitor: 主应用（启用指标导出）
# - prometheus: 指标收集和存储
# - grafana: 可视化和仪表板
#
# 使用方法:
# 1. 复制 .env.example 为 .env 并填写配置
# 2. 运行: docker-compose -f docker-compose.monitoring.yml up -d
# 3. 访问 Grafana: http://localhost:3000 (admin/admin)
# 4. 访问 Prometheus: http://localhost:9090
# 5. 访问指标端点: http://localhost:9090/metrics

services:
  # ====================
  # qBittorrent Monitor (带指标导出)
  # ====================
  qb-monitor:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    
    image: qbittorrent-clipboard-monitor:latest
    container_name: qb-monitor
    restart: unless-stopped
    
    environment:
      # qBittorrent 配置
      - QBIT_HOST=${QBIT_HOST:-host.docker.internal}
      - QBIT_PORT=${QBIT_PORT:-8080}
      - QBIT_USERNAME=${QBIT_USERNAME:-admin}
      - QBIT_PASSWORD=${QBIT_PASSWORD:-}
      - QBIT_USE_HTTPS=${QBIT_USE_HTTPS:-false}
      
      # AI 配置（可选）
      - AI_ENABLED=${AI_ENABLED:-false}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_MODEL=${AI_MODEL:-deepseek-chat}
      - AI_BASE_URL=${AI_BASE_URL:-https://api.deepseek.com/v1}
      
      # 应用配置
      - CHECK_INTERVAL=${CHECK_INTERVAL:-1.0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-UTC}
      
      # 指标导出配置
      - METRICS_ENABLED=${METRICS_ENABLED:-true}
      - METRICS_HOST=0.0.0.0
      - METRICS_PORT=9090
    
    volumes:
      - type: bind
        source: ${CONFIG_PATH:-./config.json}
        target: /app/config.json
        read_only: true
      - type: bind
        source: ${LOG_PATH:-./logs}
        target: /app/logs
    
    ports:
      # 指标导出端口
      - "9090:9090"
    
    networks:
      - monitoring-network
    
    healthcheck:
      test: ["CMD", "python", "-c", "
import sys;
import urllib.request;
try:
    urllib.request.urlopen('http://localhost:9090/metrics', timeout=5);
    sys.exit(0);
except:
    sys.exit(1)
"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # ====================
  # Prometheus
  # ====================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: qb-monitor-prometheus
    restart: unless-stopped
    
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    
    volumes:
      # Prometheus 配置
      - type: bind
        source: ./prometheus.yml
        target: /etc/prometheus/prometheus.yml
        read_only: true
      # 数据持久化
      - type: volume
        source: prometheus-data
        target: /prometheus
    
    ports:
      - "9091:9090"
    
    networks:
      - monitoring-network
    
    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # ====================
  # Grafana
  # ====================
  grafana:
    image: grafana/grafana:10.2.3
    container_name: qb-monitor-grafana
    restart: unless-stopped
    
    environment:
      # 安全配置 - 首次登录后请修改密码
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      
      # 禁用登录提示
      - GF_SECURITY_DISABLE_GRAVATAR=true
      
      # 匿名访问配置（可选）
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_ANONYMOUS_ENABLED:-false}
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      
      # 服务器配置
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
      
      # 默认数据源配置
      - GF_DEFAULT_INSTANCE_NAME=qb-monitor
      
      # 时区
      - GF_USERS_DEFAULT_THEME=dark
      - TZ=${TZ:-UTC}
    
    volumes:
      # 数据源配置
      - type: bind
        source: ./monitoring/grafana/datasources
        target: /etc/grafana/provisioning/datasources
        read_only: true
      # 仪表板配置
      - type: bind
        source: ./monitoring/grafana/dashboards
        target: /etc/grafana/provisioning/dashboards
        read_only: true
      # 数据持久化
      - type: volume
        source: grafana-data
        target: /var/lib/grafana
    
    ports:
      - "3000:3000"
    
    networks:
      - monitoring-network
    
    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ====================
  # Node Exporter（可选，主机监控）
  # ====================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: qb-monitor-node-exporter
    restart: unless-stopped
    
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    
    volumes:
      - type: bind
        source: /proc
        target: /host/proc
        read_only: true
      - type: bind
        source: /sys
        target: /host/sys
        read_only: true
      - type: bind
        source: /
        target: /rootfs
        read_only: true
    
    networks:
      - monitoring-network
    
    # 不映射端口到主机，仅在网络内访问
    # 端口: 9100
    
    deploy:
      mode: global
      resources:
        limits:
          cpus: '0.2'
          memory: 128M

  # ====================
  # cadvisor（可选，容器监控）
  # ====================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: qb-monitor-cadvisor
    restart: unless-stopped
    
    privileged: true
    
    devices:
      - /dev/kmsg
    
    volumes:
      - type: bind
        source: /var/run
        target: /var/run
        read_only: true
      - type: bind
        source: /var/lib/docker
        target: /var/lib/docker
        read_only: true
      - type: bind
        source: /sys
        target: /sys
        read_only: true
      - type: bind
        source: /
        target: /rootfs
        read_only: true
    
    networks:
      - monitoring-network
    
    # 端口: 8080
    
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  monitoring-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.26.0.0/16

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
