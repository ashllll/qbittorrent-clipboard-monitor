name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -e .
        pip install pytest pytest-asyncio pytest-cov black flake8 mypy

    - name: Lint with Black
      run: black --check --diff qbittorrent_monitor/ || true

    - name: Run linter
      run: flake8 qbittorrent_monitor/ --max-line-length=100 || true

    - name: Type checking
      run: mypy qbittorrent_monitor/ --ignore-missing-imports || true

    - name: Run tests
      run: |
        pytest tests/ -v --cov=qbittorrent_monitor --cov-report=term-missing || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'

    - name: Install dependencies
      run: pip install -e .

    - name: Run safety check
      run: pip install safety && safety check || true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: pip install -e .

    - name: Build package
      run: pip wheel . --wheel-dir dist/ -w

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
